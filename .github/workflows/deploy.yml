name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - name: Trigger Worker deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - name: Trigger Frontend deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"