databases:
  - name: rl-platform-db
    databaseName: rlplatform
    user: rlplatform
    plan: free

services:
  - type: web
    name: rl-platform-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rl-platform-db
          property: connectionString
      - key: REDIS_URL
        value: redis://default:@rl-platform-redis:6379/0
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant

  - type: worker
    name: rl-platform-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rl-platform-db
          property: connectionString
      - key: REDIS_URL
        value: redis://default:@rl-platform-redis:6379/0
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant

  - type: web
    name: rl-platform-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx vite preview --host 0.0.0.0 --port 3000
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: rl-platform-api
          type: web
          property: host